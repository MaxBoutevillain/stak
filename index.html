<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stak</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sand-50:  #FAF8F5;
  --sand-100: #F2EDE6;
  --sand-200: #E4DDD2;
  --sand-300: #C9BFB2;
  --stone-400: #9E9488;
  --stone-500: #7A7169;
  --stone-700: #3D3830;
  --stone-900: #1C1915;
  --accent:   #6B5E52;
  --r: 10px;
}

html, body {
  min-height: 100%;
  background: var(--sand-50);
  color: var(--stone-900);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── LOCK ── */
#lock-screen {
  position: fixed; inset: 0;
  background: var(--sand-50);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 100;
}

.lock-title {
  font-family: 'DM Serif Display', serif;
  font-size: 38px;
  font-weight: 400;
  color: var(--stone-900);
  letter-spacing: -0.03em;
}

.lock-sub {
  font-size: 11px;
  color: var(--stone-400);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: -24px;
}

.lock-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 240px;
}

.lock-input {
  width: 100%;
  padding: 11px 16px;
  background: white;
  border: 1px solid var(--sand-200);
  border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--stone-900);
  outline: none;
  text-align: center;
  letter-spacing: 0.2em;
  transition: border-color 0.2s;
}
.lock-input::placeholder { letter-spacing: 0.04em; color: var(--stone-400); }
.lock-input:focus { border-color: var(--accent); }
.lock-input.error { border-color: #c0392b; animation: shake 0.28s; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  30% { transform: translateX(-7px); }
  70% { transform: translateX(7px); }
}

.lock-btn {
  padding: 11px;
  background: var(--stone-900);
  color: var(--sand-50);
  border: none;
  border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s;
}
.lock-btn:hover { background: var(--accent); }

/* ── APP ── */
#app {
  display: none;
  width: 100%;
  padding: 0;
}

/* ── HEADER ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 44px;
  border-bottom: 1px solid var(--sand-200);
  margin-bottom: 0;
}

.app-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.03em;
  color: var(--stone-900);
}

.week-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-btn {
  width: 30px; height: 30px;
  background: none;
  border: 1px solid var(--sand-200);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--stone-500);
  font-size: 16px;
  line-height: 1;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--stone-400); color: var(--stone-900); }

.week-label {
  font-size: 12px;
  color: var(--stone-400);
  letter-spacing: 0.04em;
  min-width: 140px;
  text-align: center;
}

/* ── TABS ── */
.tabs {
  display: flex;
  margin-bottom: 0;
  border-bottom: 1px solid var(--sand-200);
  padding: 0 24px;
}

.tab-btn {
  padding: 9px 22px 11px;
  background: none;
  border: none;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--stone-400);
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--stone-700); }
.tab-btn.active {
  color: var(--stone-900);
  border-bottom-color: var(--stone-900);
  font-weight: 500;
}

.dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #a3c99a;
  margin-left: 7px;
  vertical-align: middle;
  position: relative; top: -1px;
}

/* ── GRID ── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 0;
  margin-bottom: 0;
  border-bottom: 1px solid var(--sand-200);
}

.tab-panel.active {
  display: block;
}

.tab-panel {
  display: none;
}

.day-col {
  background: white;
  border-right: 1px solid var(--sand-200);
  border-radius: 0;
  overflow: hidden;
  transition: none;
  min-height: calc(100vh - 200px);
  display: flex;
  flex-direction: column;
}
.day-col:last-child { border-right: none; }
.day-col.today { background: var(--sand-50); }

.day-header {
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--sand-100);
  flex-shrink: 0;
}

.day-name {
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--stone-400);
}
.day-col.today .day-name { color: var(--accent); }

.day-num {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  font-weight: 400;
  color: var(--stone-900);
  line-height: 1.1;
  margin-top: 2px;
}
.day-col.today .day-num { color: var(--accent); }

.tasks {
  padding: 10px 16px 4px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--sand-100);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: none; }

.task-check {
  width: 14px; height: 14px;
  min-width: 14px;
  border: 1px solid var(--sand-300);
  border-radius: 3px;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 9px;
  color: transparent;
  flex-shrink: 0;
}
.task-item.done .task-check {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.task-body {
  flex: 1;
  min-width: 0;
}

.task-text {
  font-size: 14px;
  font-weight: 300;
  color: var(--stone-700);
  line-height: 1.5;
  word-break: break-word;
  display: block;
}
.task-item.done .task-text {
  text-decoration: line-through;
  color: var(--stone-400);
}

.task-note-preview {
  font-size: 10.5px;
  color: var(--stone-400);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
}

.task-actions {
  display: flex;
  gap: 3px;
  opacity: 0;
  transition: opacity 0.1s;
  flex-shrink: 0;
}
.task-item:hover .task-actions { opacity: 1; }

.task-action-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--stone-400);
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
  transition: color 0.1s;
}
.task-action-btn:hover { color: var(--stone-700); }
.task-action-btn.del:hover { color: #c0392b; }

.add-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px 16px;
  flex-shrink: 0;
}

.plus-icon {
  font-size: 14px;
  font-weight: 300;
  color: var(--sand-300);
  min-width: 14px;
  line-height: 1;
}

.add-input {
  font-size: 12px;
  font-weight: 300;
  border: none;
  background: none;
  color: var(--stone-700);
  outline: none;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
}
.add-input::placeholder { color: var(--sand-300); font-size: 11px; }

/* ── DETAIL PANEL ── */
.panel-overlay {
  position: fixed; inset: 0;
  background: rgba(28,25,21,0.3);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.panel-overlay.open { display: flex; }

.detail-panel {
  background: white;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 560px;
  padding: 28px 28px 40px;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.panel-overlay.open .detail-panel { transform: translateY(0); }

.panel-handle {
  width: 36px; height: 4px;
  background: var(--sand-200);
  border-radius: 2px;
  margin: 0 auto -8px;
}

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.panel-task-text {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--stone-900);
  letter-spacing: -0.02em;
  line-height: 1.3;
  flex: 1;
}

.panel-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--stone-400);
  font-size: 20px;
  line-height: 1;
  padding: 2px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.panel-close:hover { color: var(--stone-900); }

.panel-note-label {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--stone-400);
}

.panel-note {
  width: 100%;
  border: 1px solid var(--sand-200);
  border-radius: var(--r);
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 300;
  color: var(--stone-700);
  line-height: 1.7;
  resize: none;
  outline: none;
  min-height: 100px;
  transition: border-color 0.2s;
}
.panel-note:focus { border-color: var(--accent); }
.panel-note::placeholder { color: var(--sand-300); }

.panel-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-done-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border: 1px solid var(--sand-200);
  border-radius: var(--r);
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--stone-500);
  cursor: pointer;
  transition: all 0.15s;
}
.panel-done-btn:hover { border-color: var(--accent); color: var(--accent); }
.panel-done-btn.done {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.panel-del-btn {
  background: none;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--stone-400);
  cursor: pointer;
  transition: color 0.15s;
}
.panel-del-btn:hover { color: #c0392b; }

/* ── OBJECTIVE ── */
.objective-wrap {
  padding: 24px 24px 48px;
  border-top: 1px solid var(--sand-200);
}

.obj-label {
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--stone-400);
  margin-bottom: 12px;
}

.objective-block {
  background: none;
  border: none;
  border-radius: 0;
  padding: 0;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.obj-line {
  width: 2px; min-width: 2px;
  align-self: stretch;
  background: var(--sand-200);
  border-radius: 2px;
  margin-top: 2px;
}

.objective-input {
  width: 100%;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--stone-700);
  resize: none;
  outline: none;
  min-height: 52px;
  line-height: 1.7;
}
.objective-input::placeholder { color: var(--sand-300); }


</style>
</head>
<body>

<div id="lock-screen">
  <p class="lock-sub">espace privé</p>
  <h1 class="lock-title">stak</h1>
  <div class="lock-form">
    <input type="password" id="pwd-input" class="lock-input" placeholder="mot de passe" autocomplete="off" />
    <button class="lock-btn" onclick="checkPassword()">entrer</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <span class="app-title">stak</span>
    <div class="week-nav">
      <button class="nav-btn" onclick="shiftWeek(-1)">&#8249;</button>
      <span class="week-label" id="week-label"></span>
      <button class="nav-btn" onclick="shiftWeek(1)">&#8250;</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('maxime')" id="tab-maxime">
      Maxime <span class="dot"></span>
    </button>
    <button class="tab-btn" onclick="switchTab('arnaud')" id="tab-arnaud">
      Arnaud <span class="dot"></span>
    </button>
  </div>

  <div id="panel-maxime" class="tab-panel active">
    <div class="week-grid" id="grid-maxime"></div>
  </div>
  <div id="panel-arnaud" class="tab-panel">
    <div class="week-grid" id="grid-arnaud"></div>
  </div>

  <div class="objective-wrap">
    <div class="obj-label">objectif de la semaine</div>
    <div class="objective-block">
      <div class="obj-line"></div>
      <textarea class="objective-input" id="objective-input" placeholder="Quel est l'objectif principal cette semaine ?" rows="2"></textarea>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <span class="panel-task-text" id="panel-task-text"></span>
      <button class="panel-close" onclick="closePanel(null)">×</button>
    </div>
    <div>
      <div class="panel-note-label">note</div>
      <textarea class="panel-note" id="panel-note" placeholder="Ajoute un détail, un lien, une info…" rows="4"></textarea>
    </div>
    <div class="panel-footer">
      <button class="panel-done-btn" id="panel-done-btn" onclick="toggleDoneFromPanel()">
        <span id="panel-done-check">○</span>
        <span id="panel-done-label">marquer fait</span>
      </button>
      <button class="panel-del-btn" onclick="deleteFromPanel()">supprimer</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://lhkvtsdovljrsxrskxmk.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoa3Z0c2RvdmxqcnN4cnNreG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Nzk5NDUsImV4cCI6MjA5NjQ1NTk0NX0.TYkjYlBbaE7PRBPLRluxqhtp5sisgdkfp_WIrWKlxd0';
const PASSWORD      = 'St@k.2026A&M';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS   = ['lun','mar','mer','jeu','ven','sam','dim'];
const MONTHS = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

let weekOffset  = 0;
let activeTab   = 'maxime';
let objDebounce = null;
let noteDebounce = null;
let currentTaskId   = null;
let currentTaskUser = null;

function checkPassword() {
  const v = document.getElementById('pwd-input').value;
  if (v === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    const inp = document.getElementById('pwd-input');
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function getWeekStart(offset) {
  const now  = new Date();
  const diff = (now.getDay() === 0 ? -6 : 1 - now.getDay());
  const mon  = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function dateKey(d) { return d.toISOString().slice(0,10); }

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function weekKey() { return dateKey(getWeekStart(weekOffset)); }

async function renderGrid(user) {
  const monday = getWeekStart(weekOffset);
  const friday = new Date(monday); friday.setDate(monday.getDate()+4);
  document.getElementById('week-label').textContent =
    monday.getDate()+' '+MONTHS[monday.getMonth()]+' – '+friday.getDate()+' '+MONTHS[friday.getMonth()];

  const start = dateKey(monday);
  const end   = dateKey(new Date(monday.getTime() + 6*86400000));

  const { data: tasks } = await db
    .from('tasks')
    .select('*')
    .eq('user_name', user)
    .gte('day', start)
    .lte('day', end)
    .order('created_at', { ascending: true });

  const grid = document.getElementById('grid-' + user);
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d   = new Date(monday); d.setDate(monday.getDate()+i);
    const key = dateKey(d);
    const dayTasks = (tasks||[]).filter(t => t.day === key);

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday(d) ? ' today' : '');

    const tasksHtml = dayTasks.map(t => `
      <div class="task-item${t.done?' done':''}">
        <div class="task-check" onclick="toggleTask(${t.id},'${user}')">${t.done?'✓':''}</div>
        <div class="task-body" onclick="openPanel(${t.id},'${user}')">
          <span class="task-text">${esc(t.text)}</span>
          ${t.note ? `<span class="task-note-preview">${esc(t.note)}</span>` : ''}
        </div>
        <div class="task-actions">
          <button class="task-action-btn" onclick="openPanel(${t.id},'${user}')" title="détail">↗</button>
          <button class="task-action-btn del" onclick="deleteTask(${t.id},'${user}')" title="supprimer">×</button>
        </div>
      </div>
    `).join('');

    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAYS[i]}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>
      <div class="tasks">${tasksHtml}</div>
      <div class="add-row">
        <span class="plus-icon">+</span>
        <input class="add-input" placeholder="ajouter…"
          onkeydown="if(event.key==='Enter'&&this.value.trim()){addTask('${key}','${user}',this.value);this.value=''}" />
      </div>
    `;
    grid.appendChild(col);
  }
}

async function renderObjective() {
  const { data } = await db.from('objectives').select('text').eq('week_key', weekKey()).maybeSingle();
  document.getElementById('objective-input').value = data?.text || '';
}

async function addTask(day, user, text) {
  await db.from('tasks').insert({ day, user_name: user, text: text.trim(), done: false });
  renderGrid(user);
}

async function toggleTask(id, user) {
  const { data } = await db.from('tasks').select('done').eq('id', id).single();
  await db.from('tasks').update({ done: !data.done }).eq('id', id);
  renderGrid(user);
  if (currentTaskId === id) {
    const newDone = !data.done;
    const btn = document.getElementById('panel-done-btn');
    btn.classList.toggle('done', newDone);
    document.getElementById('panel-done-check').textContent = newDone ? '✓' : '○';
    document.getElementById('panel-done-label').textContent = newDone ? 'fait !' : 'marquer fait';
  }
}

async function deleteTask(id, user) {
  await db.from('tasks').delete().eq('id', id);
  renderGrid(user);
}

// ── DETAIL PANEL ──
async function openPanel(id, user) {
  const { data: t } = await db.from('tasks').select('*').eq('id', id).single();
  if (!t) return;

  currentTaskId   = id;
  currentTaskUser = user;

  document.getElementById('panel-task-text').textContent = t.text;
  document.getElementById('panel-note').value = t.note || '';

  const btn = document.getElementById('panel-done-btn');
  btn.classList.toggle('done', t.done);
  document.getElementById('panel-done-check').textContent = t.done ? '✓' : '○';
  document.getElementById('panel-done-label').textContent = t.done ? 'fait !' : 'marquer fait';

  document.getElementById('panel-overlay').classList.add('open');
}

function closePanel(e) {
  if (e && e.target !== document.getElementById('panel-overlay')) return;
  document.getElementById('panel-overlay').classList.remove('open');
  currentTaskId = null;
  currentTaskUser = null;
}

document.getElementById('panel-note').addEventListener('input', function() {
  clearTimeout(noteDebounce);
  const val = this.value;
  noteDebounce = setTimeout(async () => {
    if (!currentTaskId) return;
    await db.from('tasks').update({ note: val }).eq('id', currentTaskId);
    renderGrid(currentTaskUser);
  }, 500);
});

async function toggleDoneFromPanel() {
  if (!currentTaskId) return;
  await toggleTask(currentTaskId, currentTaskUser);
}

async function deleteFromPanel() {
  if (!currentTaskId) return;
  await deleteTask(currentTaskId, currentTaskUser);
  document.getElementById('panel-overlay').classList.remove('open');
  currentTaskId = null;
}

// ── OBJECTIVE ──
document.getElementById('objective-input').addEventListener('input', function() {
  clearTimeout(objDebounce);
  const val = this.value;
  objDebounce = setTimeout(async () => {
    await db.from('objectives').upsert({ week_key: weekKey(), text: val }, { onConflict: 'week_key' });
  }, 600);
});

function subscribeRealtime() {
  db.channel('tasks-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => {
      renderGrid(activeTab);
    })
    .subscribe();

  db.channel('obj-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'objectives' }, payload => {
      if (payload.new?.week_key === weekKey()) {
        const inp = document.getElementById('objective-input');
        if (document.activeElement !== inp) inp.value = payload.new.text || '';
      }
    })
    .subscribe();
}

function switchTab(user) {
  activeTab = user;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+user).classList.add('active');
  document.getElementById('panel-'+user).classList.add('active');
  renderGrid(user);
}

function shiftWeek(dir) {
  weekOffset += dir;
  renderGrid('maxime');
  renderGrid('arnaud');
  renderObjective();
}

function init() {
  renderGrid('maxime');
  renderGrid('arnaud');
  renderObjective();
  subscribeRealtime();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
